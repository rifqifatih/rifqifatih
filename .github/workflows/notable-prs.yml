name: Notable PRs

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC
  workflow_dispatch:        # manual trigger
  push:
    branches: ["main"]

jobs:
  update-notable-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # --- tweak these to taste ---
      MAX_PRS: "10"          # number of rows to display
      MIN_STARS: "1"         # only include repos with at least this many stars
      ONE_PER_REPO: "true"   # one row per repository; set "false" to list every PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate notable PRs section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-notable-prs.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update notable PRs"
            git push
          fi
